</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">H<span>VAULT</span></a>

    <div class="grid" id="homeGrid"></div>

    <script src="videos.js"></script>
    <script>
        const vids = getVideos().filter(v => !v.isUpcoming).reverse().slice(0, 10);
        const container = document.getElementById('homeGrid');
        
        container.innerHTML = vids.map(v => `
            <div class="card" onclick="location.href='video.html?id=${v.id}'">
                <img src="${v.image}" class="card-img">
                <div class="badge-18">18+</div>
                <div class="card-overlay">
                    <p style="color: var(--neon); font-size: 10px; font-weight: bold;">${v.ep} • ❤️ ${v.rating}/5</p>
                    <h3 class="font-poppins" style="font-size: 1rem;">${v.title}</h3>

        `).join('');
